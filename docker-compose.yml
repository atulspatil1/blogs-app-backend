version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: blogs_app_db
    restart: always
    environment:
      POSTGRES_DB: personal_blog_db
      POSTGRES_USER: blogs_user
      POSTGRES_PASSWORD: secure_password_here
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - blogs_network

  backend:
    build: .
    container_name: blogs_app_backend
    restart: always
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_USERNAME=blogs_user
      - DB_PASSWORD=secure_password_here
      # Connect to the docker service name 'db' instead of localhost
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/personal_blog_db
      - JWT_SECRET=change_this_to_a_long_secure_random_string_in_production
      - CORS_ALLOWED_ORIGINS=https://your-frontend-domain.com

    networks:
      - blogs_network

volumes:
  db_data:

networks:
  blogs_network:
    driver: bridge
