version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: blogs_app_db
    restart: always
    environment:
      MYSQL_DATABASE: personal_blog_db
      MYSQL_ROOT_PASSWORD: root_password_here
      MYSQL_USER: blogs_user
      MYSQL_PASSWORD: secure_password_here
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - blogs_network

  backend:
    build: .
    container_name: blogs_app_backend
    restart: always
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_USERNAME=blogs_user
      - DB_PASSWORD=secure_password_here
      # Connect to the docker service name 'db' instead of localhost
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/personal_blog_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - JWT_SECRET=change_this_to_a_long_secure_random_string_in_production
      - CORS_ALLOWED_ORIGINS=https://your-frontend-domain.com
    networks:
      - blogs_network

volumes:
  db_data:

networks:
  blogs_network:
    driver: bridge
