name: "Deploy"
run-name: "Deploy - ${{ github.event.head_commit.timestamp }}"

on:
  push:
    branches: [ main ]

jobs:

  # JOB 1: BUILD & TEST (Runs on every main branch Push)
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compile and Run Tests
        # Ensures the code is unbroken before allowing a deployment
        run: ./mvnw clean test

  # JOB 2: DOCKER DEPLOY (Strictly controlled)
  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    # RESTRICTION: Only run if checking into main AND triggered by specific user
    if: github.ref == 'refs/heads/main' && github.actor == 'atulspatil1'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        # Add these as GitHub Repository Secrets (Settings -> Secrets -> Actions)
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Replace 'yourdockerhubusername' with your actual username
          tags: ${{ secrets.DOCKER_USERNAME }}/blogs-app-backend:latest
