spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/personal_blog_db}
    hikari:
      maximum-pool-size: 15
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

# Disable Swagger UI in production for security
springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false

logging:
  level:
    root: INFO
    org.atulspatil1.blogsappbackend: INFO
    org.springframework.web: WARN
    org.hibernate.SQL: WARN
