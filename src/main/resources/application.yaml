spring:
  application:
    name: blogs-app-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/personal_blog_db
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate :
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080


# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health

app:
  # JWT Configuration
  jwt:
    secret: ${JWT_SECRET}  # FAIL FAST: If JWT_SECRET env var is not set, deployment will fail
    expiration-ms: 86400000   # 24 hours

  # CORS configuration
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

