spring:
  application:
    name: blogs-app-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/personal_blog_db
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate :
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080


# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health

app:
  # JWT Configuration
  jwt:
    secret: ${JWT_SECRET:7a3f8c2e1b9d4f6a0e5c8b3d7f2a9e4c1b8d5f3a7e2c9b6d4f1a8e5c2b9d7f4a}  # Set JWT_SECRET env var in production!
    expiration-ms: 86400000   # 24 hours

  # CORS configuration
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] [traceId=%X{traceId:-}] %logger{36} - %msg%n"
  level:
    root: INFO
